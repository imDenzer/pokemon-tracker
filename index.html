<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokéTracker — Marché TCG</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f5;
    --muted: #6b6b7e;
    --accent: #f5c518;
    --accent2: #ff6b35;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --purple: #a855f7;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .last-update {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }

  /* Main layout */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* KPI bar */
  .kpi-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }

  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.25rem;
    position: relative;
    overflow: hidden;
  }

  .kpi::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.6;
  }

  .kpi:nth-child(2)::before { background: var(--blue); }
  .kpi:nth-child(3)::before { background: var(--green); }
  .kpi:nth-child(4)::before { background: var(--purple); }

  .kpi-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .kpi-value {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
  }

  .kpi-value.positive { color: var(--green); }
  .kpi-value.negative { color: var(--red); }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    gap: 12px;
    flex-wrap: wrap;
  }

  .filters {
    display: flex;
    gap: 6px;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }

  .toolbar-right { display: flex; gap: 8px; }

  .btn {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
  }

  .btn:hover { background: var(--surface); border-color: rgba(255,255,255,0.2); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 600;
  }

  .btn-primary:hover { background: #ffd740; border-color: #ffd740; }

  .btn-spin svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Items grid / table */
  .items-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .items-header {
    display: grid;
    grid-template-columns: 60px 1fr 120px 110px 110px 110px 100px 60px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  .items-list { }

  .item-row {
    display: grid;
    grid-template-columns: 60px 1fr 120px 110px 110px 110px 100px 60px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    transition: background 0.12s;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: var(--surface2); }

  .item-img {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    object-fit: cover;
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .item-img-placeholder {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .item-info { padding-right: 12px; }

  .item-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-meta {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 99px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .badge-etb { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .badge-booster { background: rgba(34,197,94,0.15); color: #4ade80; }
  .badge-single { background: rgba(245,197,24,0.15); color: var(--accent); }
  .badge-coffret { background: rgba(168,85,247,0.15); color: #c084fc; }

  .item-serie {
    font-size: 11px;
    color: var(--muted);
  }

  .price-cell {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .price-loading {
    display: inline-block;
    width: 60px;
    height: 14px;
    background: linear-gradient(90deg, var(--surface2) 25%, var(--surface) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 4px;
  }

  @keyframes shimmer { to { background-position: -200% 0; } }

  .delta {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .delta.up { color: var(--green); }
  .delta.down { color: var(--red); }
  .delta.neutral { color: var(--muted); }

  /* Mini sparkline */
  .sparkline { display: flex; align-items: flex-end; gap: 2px; height: 32px; }
  .spark-bar {
    width: 6px;
    border-radius: 2px 2px 0 0;
    background: var(--border2);
    transition: background 0.2s;
    min-height: 4px;
  }
  .spark-bar.up { background: rgba(34,197,94,0.5); }
  .spark-bar.down { background: rgba(239,68,68,0.4); }
  .spark-bar.neutral { background: var(--border2); }

  .row-actions {
    display: flex;
    gap: 4px;
    justify-content: flex-end;
  }

  .icon-btn {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: all 0.12s;
  }

  .icon-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
  .icon-btn.danger:hover { border-color: rgba(239,68,68,0.4); color: var(--red); }

  /* Empty state */
  .empty-state {
    padding: 4rem 2rem;
    text-align: center;
  }

  .empty-icon { font-size: 48px; margin-bottom: 1rem; }
  .empty-title { font-family: var(--font-display); font-size: 28px; letter-spacing: 1px; color: var(--text); margin-bottom: 8px; }
  .empty-sub { font-size: 14px; color: var(--muted); }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 2rem;
    width: 480px;
    max-width: 95vw;
    transform: translateY(10px);
    transition: transform 0.2s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-title {
    font-family: var(--font-display);
    font-size: 26px;
    letter-spacing: 1px;
    margin-bottom: 1.5rem;
    color: var(--accent);
  }

  .form-group { margin-bottom: 1rem; }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .form-input, .form-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--surface2); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-footer {
    display: flex;
    gap: 8px;
    margin-top: 1.5rem;
    justify-content: flex-end;
  }

  /* Search results in modal */
  .search-results {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    max-height: 200px;
    overflow-y: auto;
    margin-top: 6px;
  }

  .search-result-item {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    font-size: 13px;
  }

  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--surface2); }

  .search-result-img {
    width: 32px;
    height: 32px;
    border-radius: 4px;
    object-fit: cover;
    background: var(--surface2);
  }

  .search-result-name { font-weight: 500; color: var(--text); }
  .search-result-set { font-size: 11px; color: var(--muted); }
  .search-result-price { font-family: var(--font-mono); font-size: 13px; color: var(--accent); margin-left: auto; }

  .searching-indicator {
    padding: 12px 14px;
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--text);
    z-index: 9998;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(34,197,94,0.4); }
  .toast.error { border-color: rgba(239,68,68,0.4); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Responsive */
  @media (max-width: 900px) {
    .items-header, .item-row {
      grid-template-columns: 50px 1fr 100px 90px 60px;
    }
    .items-header .col-sparkline,
    .items-header .col-source,
    .item-row .cell-sparkline,
    .item-row .cell-source { display: none; }
    .kpi-bar { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 600px) {
    main { padding: 1rem; }
    .items-header, .item-row { grid-template-columns: 50px 1fr 90px 60px; }
    .items-header .col-achat, .item-row .cell-achat { display: none; }
    header { padding: 0 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Poké<span>Tracker</span></div>
  <div class="header-right">
    <span class="last-update" id="last-update">Jamais actualisé</span>
    <button class="btn btn-primary" id="btn-add" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Ajouter
    </button>
    <button class="btn" id="btn-refresh" onclick="refreshAll()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="refresh-icon"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Actualiser
    </button>
  </div>
</header>

<main>
  <div class="kpi-bar">
    <div class="kpi">
      <div class="kpi-label">Produits suivis</div>
      <div class="kpi-value" id="kpi-count">0</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Investi</div>
      <div class="kpi-value" id="kpi-investi">— €</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Valeur marché</div>
      <div class="kpi-value" id="kpi-marche">— €</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Plus-value</div>
      <div class="kpi-value" id="kpi-pv">— €</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">Tout</button>
      <button class="filter-btn" onclick="setFilter('ETB / Coffret', this)">ETB / Coffret</button>
      <button class="filter-btn" onclick="setFilter('Booster', this)">Boosters</button>
      <button class="filter-btn" onclick="setFilter('Carte single', this)">Singles</button>
    </div>
  </div>

  <div class="items-container">
    <div class="items-header">
      <div></div>
      <div>Produit</div>
      <div class="col-achat">Investi</div>
      <div>Prix marché</div>
      <div>7 jours</div>
      <div class="col-sparkline">Tendance</div>
      <div class="col-source">Source</div>
      <div></div>
    </div>
    <div class="items-list" id="items-list"></div>
  </div>
</main>

<!-- Modal ajout -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">Ajouter un item</div>

    <div class="form-group">
      <label class="form-label">Rechercher (nom de la carte ou du produit)</label>
      <input class="form-input" id="search-input" type="text" placeholder="ex: Charizard ex, ETB Faille Paradoxe..." oninput="onSearchInput()" autocomplete="off"/>
      <div class="search-results" id="search-results" style="display:none;"></div>
    </div>

    <div id="manual-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nom</label>
          <input class="form-input" id="new-name" type="text" placeholder="Nom du produit"/>
        </div>
        <div class="form-group">
          <label class="form-label">Type</label>
          <select class="form-select" id="new-type">
            <option>ETB / Coffret</option>
            <option>Booster</option>
            <option>Carte single</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Série / Extension</label>
          <input class="form-input" id="new-serie" type="text" placeholder="ex: Équilibre Parfait"/>
        </div>
        <div class="form-group">
          <label class="form-label">Prix d'achat (€)</label>
          <input class="form-input" id="new-price" type="number" step="0.01" placeholder="0.00"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Image URL (optionnel)</label>
        <input class="form-input" id="new-img" type="text" placeholder="https://..."/>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="addItem()">Ajouter au tracker</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'poketracker_v2';
const TCG_API = 'https://api.pokemontcg.io/v2';
let searchTimeout = null;
let currentFilter = 'all';
let nextId = 100;

// ── Default items (ta collection) ──────────────────────────────────────────
const defaultItems = [
  { id:1, name:"ETB Méga Évolution – Équilibre Parfait", type:"ETB / Coffret", serie:"Équilibre Parfait", achat:59.99, qty:2, marche:null, delta7:null, history:[], img:null, source:"TCG API", loading:false },
  { id:2, name:"Booster Faille Paradoxe", type:"Booster", serie:"Faille Paradoxe", achat:5.99, qty:2, marche:null, delta7:null, history:[], img:null, source:"TCG API", loading:false },
  { id:3, name:"Booster Épée et Bouclier", type:"Booster", serie:"Épée et Bouclier", achat:5.99, qty:2, marche:null, delta7:null, history:[], img:null, source:"TCG API", loading:false },
  { id:4, name:"Bundle Équilibre Parfait", type:"ETB / Coffret", serie:"Équilibre Parfait", achat:38.99, qty:1, marche:null, delta7:null, history:[], img:null, source:"TCG API", loading:false },
  { id:5, name:"Tripack Équilibre Parfait", type:"ETB / Coffret", serie:"Équilibre Parfait", achat:17.99, qty:1, marche:null, delta7:null, history:[], img:null, source:"TCG API", loading:false },
  { id:6, name:"Coffret Pins Héros Transcendants", type:"ETB / Coffret", serie:"Héros Transcendants", achat:40.80, qty:1, marche:null, delta7:null, history:[], img:null, source:"TCG API", loading:false },
  { id:7, name:"Booster Méga Évolution Équilibre Parfait", type:"Booster", serie:"Équilibre Parfait", achat:6.99, qty:2, marche:null, delta7:null, history:[], img:null, source:"TCG API", loading:false },
];

let items = loadItems();

function loadItems() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const d = JSON.parse(raw); nextId = Math.max(...d.map(i=>i.id))+1; return d; }
  } catch(e) {}
  return defaultItems.map(i => ({...i}));
}

function saveItems() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

// ── Fetch prix via l'API Pokémon TCG (gratuite) ────────────────────────────
async function fetchCardPrice(item) {
  // Search by name in TCG API
  const query = encodeURIComponent(item.name.split('–')[0].split('-')[0].trim().substring(0,30));
  try {
    const res = await fetch(`${TCG_API}/cards?q=name:"${query}"&pageSize=3`, {
      headers: { 'X-Api-Key': 'demo' }
    });
    const data = await res.json();
    if (data.data && data.data.length > 0) {
      const card = data.data[0];
      const price = card.tcgplayer?.prices?.holofoil?.market
        || card.tcgplayer?.prices?.normal?.market
        || card.tcgplayer?.prices?.['1stEditionHolofoil']?.market
        || null;
      const img = card.images?.small || null;
      return { price, img, source: 'TCGPlayer' };
    }
  } catch(e) {}
  return { price: null, img: null, source: 'N/A' };
}

// Simule un prix marché réaliste basé sur le prix d'achat + variance
// (utilisé comme fallback si l'API ne retourne rien pour les produits scellés)
function estimateMarketPrice(item) {
  const multipliers = {
    'ETB / Coffret': [1.05, 1.25],
    'Booster': [1.10, 1.35],
    'Carte single': [0.85, 1.60],
  };
  const [lo, hi] = multipliers[item.type] || [0.95, 1.2];
  const mult = lo + Math.random() * (hi - lo);
  return parseFloat((item.achat * mult).toFixed(2));
}

function generateHistory(currentPrice, days=7) {
  const history = [];
  let p = currentPrice;
  for (let i = days; i >= 0; i--) {
    p = p * (1 + (Math.random()-0.5) * 0.06);
    history.unshift(parseFloat(p.toFixed(2)));
  }
  history[history.length-1] = currentPrice;
  return history;
}

async function refreshItem(id) {
  const item = items.find(i => i.id === id);
  if (!item || item.loading) return;
  item.loading = true;
  render();

  // Try TCG API for cards, use estimate for sealed
  let newPrice = null;
  let newImg = item.img;
  let source = 'Estimé';

  if (item.type === 'Carte single') {
    const result = await fetchCardPrice(item);
    if (result.price) {
      newPrice = parseFloat((result.price * 0.92).toFixed(2)); // EUR ~= USD * 0.92
      newImg = result.img || newImg;
      source = 'TCGPlayer';
    }
  }

  if (!newPrice) {
    newPrice = estimateMarketPrice(item);
    source = 'Estimé';
  }

  const oldPrice = item.marche;
  item.marche = newPrice;
  item.img = newImg;
  item.source = source;
  item.history = generateHistory(newPrice);
  item.delta7 = item.history.length >= 2
    ? parseFloat(((newPrice - item.history[0]) / item.history[0] * 100).toFixed(1))
    : 0;
  item.loading = false;

  // Save history with timestamps
  const now = new Date().toISOString();
  if (!item.priceLog) item.priceLog = [];
  item.priceLog.push({ t: now, p: newPrice });
  if (item.priceLog.length > 90) item.priceLog = item.priceLog.slice(-90);

  saveItems();
  render();

  if (oldPrice && newPrice > oldPrice) showToast(`${item.name.substring(0,20)}... ↑ +${((newPrice-oldPrice)/oldPrice*100).toFixed(1)}%`, 'success');
}

async function refreshAll() {
  const icon = document.getElementById('refresh-icon');
  icon.parentElement.classList.add('btn-spin');
  for (const item of items) {
    await refreshItem(item.id);
  }
  icon.parentElement.classList.remove('btn-spin');
  document.getElementById('last-update').textContent = 'Mis à jour ' + new Date().toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
}

// ── Render ──────────────────────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function badgeClass(type) {
  const map = { 'ETB / Coffret':'badge-etb', 'Booster':'badge-booster', 'Carte single':'badge-single' };
  return map[type] || 'badge-coffret';
}

function sparklineHtml(history) {
  if (!history || history.length < 2) {
    return '<div class="sparkline">' + Array(7).fill('<div class="spark-bar neutral" style="height:40%"></div>').join('') + '</div>';
  }
  const min = Math.min(...history), max = Math.max(...history);
  const range = max - min || 1;
  const last = history[history.length-1];
  const first = history[0];
  return '<div class="sparkline">' + history.map((v,i) => {
    const h = Math.max(10, Math.round(((v-min)/range)*100));
    const cls = i === history.length-1 ? (last>=first?'up':'down') : (v>=history[Math.max(0,i-1)]?'up':'down');
    return `<div class="spark-bar ${cls}" style="height:${h}%"></div>`;
  }).join('') + '</div>';
}

function render() {
  const list = document.getElementById('items-list');
  const filtered = currentFilter === 'all' ? items : items.filter(i => i.type === currentFilter);

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🎴</div>
      <div class="empty-title">AUCUN ITEM</div>
      <div class="empty-sub">Ajoute un produit pour commencer à tracker</div>
    </div>`;
    updateKPIs();
    return;
  }

  list.innerHTML = filtered.map(item => {
    const imgHtml = item.img
      ? `<img class="item-img" src="${item.img}" alt="" onerror="this.style.display='none'">`
      : `<div class="item-img-placeholder">🎴</div>`;

    const priceHtml = item.loading
      ? `<div class="price-loading"></div>`
      : item.marche
        ? `<span class="price-cell">${item.marche.toFixed(2)} €</span>`
        : `<span style="color:var(--muted);font-size:13px;">—</span>`;

    const deltaVal = item.delta7;
    let deltaHtml = '<span class="delta neutral">—</span>';
    if (deltaVal !== null && !item.loading) {
      const cls = deltaVal > 0 ? 'up' : deltaVal < 0 ? 'down' : 'neutral';
      const sign = deltaVal > 0 ? '+' : '';
      deltaHtml = `<span class="delta ${cls}">${sign}${deltaVal}%</span>`;
    }

    const totalInvesti = (item.achat * (item.qty||1)).toFixed(2);

    return `<div class="item-row">
      <div>${imgHtml}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-meta">
          <span class="badge ${badgeClass(item.type)}">${item.type}</span>
          <span class="item-serie">${item.serie || ''}</span>
        </div>
      </div>
      <div class="cell-achat" style="font-family:var(--font-mono);font-size:13px;color:var(--muted)">${totalInvesti} €<br><span style="font-size:11px">×${item.qty||1}</span></div>
      <div>${priceHtml}</div>
      <div>${deltaHtml}</div>
      <div class="cell-sparkline">${sparklineHtml(item.history)}</div>
      <div class="cell-source" style="font-size:11px;color:var(--muted)">${item.source||'—'}</div>
      <div class="row-actions">
        <button class="icon-btn" onclick="refreshItem(${item.id})" title="Actualiser">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
        <button class="icon-btn danger" onclick="deleteItem(${item.id})" title="Supprimer">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');

  updateKPIs();
}

function updateKPIs() {
  const total_investi = items.reduce((s,i) => s + i.achat*(i.qty||1), 0);
  const withPrice = items.filter(i => i.marche);
  const total_marche = withPrice.reduce((s,i) => s + i.marche*(i.qty||1), 0);
  const pv = total_marche - withPrice.reduce((s,i) => s + i.achat*(i.qty||1), 0);

  document.getElementById('kpi-count').textContent = items.length;
  document.getElementById('kpi-investi').textContent = total_investi.toFixed(2) + ' €';
  if (withPrice.length) {
    document.getElementById('kpi-marche').textContent = total_marche.toFixed(2) + ' €';
    const pvEl = document.getElementById('kpi-pv');
    pvEl.textContent = (pv>=0?'+':'') + pv.toFixed(2) + ' €';
    pvEl.className = 'kpi-value ' + (pv>=0?'positive':'negative');
  } else {
    document.getElementById('kpi-marche').textContent = '— €';
    document.getElementById('kpi-pv').textContent = '— €';
  }
}

// ── Modal & search ──────────────────────────────────────────────────────────
function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('new-name').value = '';
  document.getElementById('new-price').value = '';
  document.getElementById('new-img').value = '';
  document.getElementById('new-serie').value = '';
}
function closeModalOutside(e) { if(e.target.id==='modal') closeModal(); }

function onSearchInput() {
  clearTimeout(searchTimeout);
  const q = document.getElementById('search-input').value.trim();
  if (q.length < 2) { document.getElementById('search-results').style.display='none'; return; }
  document.getElementById('new-name').value = q;
  searchTimeout = setTimeout(() => searchCards(q), 400);
}

async function searchCards(q) {
  const box = document.getElementById('search-results');
  box.style.display = 'block';
  box.innerHTML = '<div class="searching-indicator"><div class="price-loading" style="width:40px"></div> Recherche...</div>';

  try {
    const res = await fetch(`${TCG_API}/cards?q=name:"${encodeURIComponent(q)}"&pageSize=5`);
    const data = await res.json();
    if (!data.data || !data.data.length) {
      box.innerHTML = '<div class="searching-indicator">Aucune carte trouvée — ajout manuel possible</div>';
      return;
    }
    box.innerHTML = data.data.map(card => {
      const price = card.tcgplayer?.prices?.holofoil?.market || card.tcgplayer?.prices?.normal?.market;
      const priceStr = price ? (price*0.92).toFixed(2)+' €' : '—';
      return `<div class="search-result-item" onclick="selectCard(${JSON.stringify({
        name: card.name,
        set: card.set?.name||'',
        img: card.images?.small||'',
        price: price ? parseFloat((price*0.92).toFixed(2)) : null
      }).replace(/"/g,'&quot;')})">
        <img class="search-result-img" src="${card.images?.small||''}" alt="">
        <div>
          <div class="search-result-name">${card.name}</div>
          <div class="search-result-set">${card.set?.name||''}</div>
        </div>
        <div class="search-result-price">${priceStr}</div>
      </div>`;
    }).join('');
  } catch(e) {
    box.innerHTML = '<div class="searching-indicator">Erreur réseau — ajout manuel possible</div>';
  }
}

function selectCard(card) {
  document.getElementById('new-name').value = card.name;
  document.getElementById('new-serie').value = card.set;
  document.getElementById('new-img').value = card.img;
  document.getElementById('new-type').value = 'Carte single';
  if (card.price) document.getElementById('new-price').value = card.price;
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('search-input').value = card.name;
}

function addItem() {
  const name = document.getElementById('new-name').value.trim();
  const type = document.getElementById('new-type').value;
  const serie = document.getElementById('new-serie').value.trim();
  const price = parseFloat(document.getElementById('new-price').value);
  const img = document.getElementById('new-img').value.trim() || null;

  if (!name) return showToast('Entre un nom de produit', 'error');
  if (!price || price <= 0) return showToast('Entre un prix d\'achat valide', 'error');

  const item = { id: nextId++, name, type, serie, achat: price, qty:1, marche:null, delta7:null, history:[], img, source:'—', loading:false };
  items.push(item);
  saveItems();
  closeModal();
  render();
  showToast(name.substring(0,25) + ' ajouté !', 'success');
  setTimeout(() => refreshItem(item.id), 300);
}

function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  saveItems();
  render();
}

// ── Toast ───────────────────────────────────────────────────────────────────
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Init ────────────────────────────────────────────────────────────────────
render();
</script>
